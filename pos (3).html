<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: #f5f5f0; display: flex; height: 100vh; overflow: hidden; }
  
  /* Left panel - menu */
  .menu-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  
  .top-bar { background: #1a1a2e; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .top-bar .time { font-size: 13px; opacity: 0.7; }
  .price-mode-toggle { display: flex; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 3px; gap: 2px; }
  .price-mode-toggle button { padding: 4px 12px; border-radius: 16px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; background: transparent; color: rgba(255,255,255,0.6); }
  .price-mode-toggle button.active { background: white; color: #1a1a2e; }
  .mode-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .mode-badge.shop { background: #e8f4e8; color: #2d7a2d; }
  .mode-badge.app { background: #e8eef8; color: #1a4fa8; }
  .category-bar { background: white; padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #e8e8e8; flex-shrink: 0; }
  .category-bar::-webkit-scrollbar { height: 0; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 13px; white-space: nowrap; font-family: inherit; transition: all 0.15s; color: #555; }
  .cat-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .cat-btn:hover:not(.active) { border-color: #1a1a2e; color: #1a1a2e; }
  
  .search-bar { padding: 10px 16px; background: white; border-bottom: 1px solid #e8e8e8; }
  .search-bar input { width: 100%; padding: 8px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  .search-bar input:focus { border-color: #1a1a2e; }
  
  .items-grid { flex: 1; overflow-y: auto; padding: 14px 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; align-content: start; }
  
  .item-card { background: white; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; position: relative; }
  .item-card:hover { border-color: #1a1a2e; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
  .item-card:active { transform: scale(0.97); }
  .item-card .item-name { font-size: 13px; font-weight: 500; color: #222; line-height: 1.4; margin-bottom: 8px; min-height: 36px; }
  .item-card .item-price { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .item-card .item-cat-badge { font-size: 10px; background: #f0f0f5; color: #666; padding: 2px 7px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
  
  /* Right panel - order */
  .order-panel { width: 340px; background: white; display: flex; flex-direction: column; border-left: 1px solid #e8e8e8; }
  
  .order-header { padding: 14px 16px; border-bottom: 1px solid #e8e8e8; }
  .order-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; }
  .order-meta { display: flex; gap: 8px; margin-top: 10px; }
  .order-meta input, .order-meta select { flex: 1; padding: 7px 10px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; }
  .order-meta input:focus, .order-meta select:focus { border-color: #1a1a2e; }
  
  .order-items { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .empty-cart { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }
  
  .order-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .order-item .oi-name { flex: 1; font-size: 13px; color: #333; line-height: 1.4; }
  .oi-qty { display: flex; align-items: center; gap: 4px; }
  .oi-qty button { width: 22px; height: 22px; border: 1.5px solid #ddd; border-radius: 5px; background: white; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: all 0.1s; }
  .oi-qty button:hover { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .oi-qty span { width: 22px; text-align: center; font-size: 14px; font-weight: 600; }
  .oi-price { font-size: 13px; font-weight: 600; color: #1a1a2e; min-width: 50px; text-align: right; }
  .oi-remove { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 2px 4px; }
  .oi-remove:hover { color: #e24b4a; }
  
  .order-note { padding: 0 14px 8px; }
  .order-note input { width: 100%; padding: 7px 10px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 12px; font-family: inherit; outline: none; color: #666; }
  .order-note input:focus { border-color: #1a1a2e; }
  
  .order-summary { padding: 12px 16px; border-top: 1px solid #e8e8e8; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: #666; }
  .summary-row.total { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-top: 8px; padding-top: 8px; border-top: 1.5px solid #1a1a2e; }
  
  .discount-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .discount-row input { flex: 1; padding: 7px 10px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; }
  .discount-row input:focus { border-color: #1a1a2e; }
  .discount-row button { padding: 7px 12px; background: #f0f0f5; border: none; border-radius: 7px; cursor: pointer; font-size: 12px; font-family: inherit; color: #555; }
  .discount-row button:hover { background: #e0e0e8; }
  
  .pay-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pay-btn { padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
  .pay-cash { background: #1a1a2e; color: white; }
  .pay-cash:hover { background: #2d2d50; }
  .pay-transfer { background: #e8f4e8; color: #2d7a2d; }
  .pay-transfer:hover { background: #d0ecd0; }
  .pay-card { background: #e8eef8; color: #1a4fa8; }
  .pay-card:hover { background: #d0dcf4; }
  .pay-clear { background: #fceaea; color: #a32d2d; }
  .pay-clear:hover { background: #f7c1c1; }
  
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 24px; width: 360px; max-width: 90vw; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal .amount-display { font-size: 32px; font-weight: 700; color: #1a1a2e; text-align: center; padding: 16px; background: #f5f5f0; border-radius: 10px; margin-bottom: 16px; }
  .modal .change-display { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 16px; padding: 10px; border-radius: 8px; }
  .modal .change-display.positive { background: #e8f4e8; color: #2d7a2d; }
  .modal .change-display.negative { background: #fceaea; color: #a32d2d; }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .numpad button { padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 18px; font-weight: 500; background: white; cursor: pointer; font-family: inherit; transition: all 0.1s; }
  .numpad button:hover { background: #f0f0f5; }
  .numpad button:active { transform: scale(0.95); }
  .numpad .btn-zero { grid-column: span 2; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-btns button { padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
  .btn-cancel { background: #f0f0f5; color: #555; }
  .btn-confirm { background: #1a1a2e; color: white; }
  
  /* Receipt modal */
  .receipt { font-size: 13px; }
  .receipt-header { text-align: center; margin-bottom: 12px; }
  .receipt-header h3 { font-size: 16px; font-weight: 700; }
  .receipt-items { border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 8px 0; margin: 8px 0; }
  .receipt-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .receipt-total { font-weight: 700; font-size: 15px; }
  .receipt-thanks { text-align: center; color: #888; font-size: 12px; margin-top: 10px; }

  /* Mobile tab navigation */
  .mobile-tabs { display: none; }

  @media (max-width: 700px) {
    body { flex-direction: column; position: relative; }
    
    /* Tab bar at bottom */
    .mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e0e0e0; z-index: 50; height: 56px; }
    .mobile-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 10px; color: #aaa; gap: 2px; transition: all 0.15s; }
    .mobile-tab .tab-icon { font-size: 20px; }
    .mobile-tab.active { color: #1a1a2e; }
    .mobile-tab.active .tab-icon { transform: scale(1.1); }
    .cart-badge { background: #e24b4a; color: white; border-radius: 10px; padding: 1px 5px; font-size: 10px; font-weight: 700; position: absolute; top: 6px; right: calc(50% - 22px); }

    /* Panels fill screen above tab bar */
    .menu-panel { width: 100%; height: calc(100vh - 56px); display: none; flex-direction: column; }
    .menu-panel.active { display: flex; }
    .order-panel { width: 100%; height: calc(100vh - 56px); border-left: none; display: none; flex-direction: column; }
    .order-panel.active { display: flex; }

    /* Top bar compact */
    .top-bar h1 { font-size: 14px; }
    .top-bar { padding: 8px 12px; }
    .price-mode-toggle button { padding: 3px 8px; font-size: 11px; }
    .top-bar .time { display: none; }

    /* Bigger touch targets for menu cards */
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 10px 12px; }
    .item-card { padding: 10px; }
    .item-name { font-size: 12px; min-height: 32px; }
    .item-price { font-size: 14px; }

    /* Bigger qty buttons */
    .oi-qty button { width: 28px; height: 28px; font-size: 16px; }
    .oi-qty span { font-size: 15px; }

    /* Pay buttons bigger */
    .pay-btn { padding: 14px; font-size: 15px; }

    /* Modal full screen on mobile */
    .modal { width: 95vw; max-height: 90vh; overflow-y: auto; }
    .numpad button { padding: 16px; font-size: 20px; }
  }
</style>
</head>
<body>

<div class="menu-panel">
  <div class="top-bar">
    <h1>☕ POS ระบบขาย <span class="mode-badge shop" id="modeBadge">หน้าร้าน</span></h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="price-mode-toggle">
        <button id="btnShop" class="active" onclick="setPriceMode('shop')">🏪 หน้าร้าน</button>
        <button id="btnApp" onclick="setPriceMode('app')">📱 แอป</button>
      </div>
      <span class="time" id="clock"></span>
    </div>
  </div>
  <div class="category-bar" id="categoryBar"></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 ค้นหาเมนู..." oninput="filterItems()">
  </div>
  <div class="items-grid" id="itemsGrid"></div>
</div>

<div class="order-panel">
  <div class="order-header">
    <h2>🧾 รายการสั่ง</h2>
    <div class="order-meta">
      <input type="text" id="tableNum" placeholder="โต๊ะ / ชื่อ">
      <select id="orderType" onchange="onOrderTypeChange()">
        <option value="shop_eat">🏪 ทานที่ร้าน</option>
        <option value="shop_take">🏪 กลับบ้าน</option>

        <option value="app_line">📱 Line Man</option>

  </div>
  <div class="order-note">
    <input type="text" id="orderNote" placeholder="หมายเหตุ / ข้อมูลเพิ่มเติม...">

  <div class="order-summary">
    <div class="summary-row"><span>รวม</span><span id="subtotal">฿0</span></div>
    <div class="discount-row">
      <input type="number" id="discountInput" placeholder="ส่วนลด (บาท)" min="0">
      <button onclick="applyDiscount()">ใช้</button>
    </div>
    <div class="summary-row"><span>ส่วนลด</span><span id="discountAmt" style="color:#e24b4a;">-฿0</span></div>
    <div class="summary-row total"><span>ยอดรวม</span><span id="totalAmt">฿0</span></div>
    <div class="pay-buttons" style="margin-top:12px;">
      <button class="pay-btn pay-cash" onclick="openPayModal('เงินสด')">💵 เงินสด</button>
      <button class="pay-btn pay-transfer" onclick="openPayModal('โอนเงิน')">📱 โอนเงิน</button>
      <button class="pay-btn pay-card" onclick="openPayModal('บัตรเครดิต')">💳 บัตร</button>
      <button class="pay-btn pay-clear" onclick="clearOrder()">🗑 ล้าง</button>
    </div>
  </div>
</div>

<!-- Mobile tab bar -->
<div class="mobile-tabs">
  <button class="mobile-tab active" id="tabMenu" onclick="switchTab('menu')">
    <span class="tab-icon">🍽</span>
    <span>เมนู</span>
  </button>
  <button class="mobile-tab" id="tabOrder" onclick="switchTab('order')">
    <span class="tab-icon">🧾</span>
    <span id="tabOrderLabel">ออเดอร์</span>
    <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
  </button>
</div>

<!-- Payment modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <h3 id="payModalTitle">ชำระเงิน</h3>
    <div class="amount-display">
      ยอดรวม: <span id="payTotalDisp">฿0</span>
    </div>
    <div style="margin-bottom:8px;font-size:13px;color:#666;">รับเงิน (บาท)</div>
    <div style="border:1.5px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:12px;min-height:46px;" id="cashInput">0</div>
    <div class="numpad">
      <button onclick="numpadPress('1')">1</button><button onclick="numpadPress('2')">2</button><button onclick="numpadPress('3')">3</button>
      <button onclick="numpadPress('4')">4</button><button onclick="numpadPress('5')">5</button><button onclick="numpadPress('6')">6</button>
      <button onclick="numpadPress('7')">7</button><button onclick="numpadPress('8')">8</button><button onclick="numpadPress('9')">9</button>
      <button onclick="numpadPress('back')">⌫</button><button class="btn-zero" onclick="numpadPress('0')">0</button>
    </div>
    <div class="change-display" id="changeDisplay">เงินทอน: ฿0</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePayModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="confirmPayment()">✓ ยืนยัน</button>
    </div>
  </div>
</div>

<!-- Receipt modal -->
<div class="modal-overlay" id="receiptModal">
  <div class="modal">
    <div class="receipt" id="receiptContent"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeReceiptModal()">ปิด</button>
      <button class="btn-confirm" onclick="printReceipt()">🖨 พิมพ์</button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr-QrfDgsQ-ONLwApRKYXL6Wkw6TUk6nDGqS1mgEv6rBhuMbJIo6hB8sqOWB4nTwGF/exec';

async function loadStockFromSheets() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getStock');
    const data = await res.json();
    if (data.success) {
      Object.values(data.stock).forEach(stockItem => {
        const menuItem = MENU.find(m => m.id == stockItem.id);
        if (menuItem) {
          menuItem.available = stockItem.available;
          menuItem.stock = stockItem.stock;
        }
      });
      filterItems();
    }
  } catch (err) {
    console.warn('โหลดสต็อกไม่ได้:', err);
  }
}

async function syncOrderToSheets(orderData) {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveOrder', ...orderData })
    });
  } catch (err) {
    console.warn('Sync ไม่ได้:', err);
  }
}

const CATEGORIES = ['ทั้งหมด', ...new Set(MENU.map(i => i.cat))];
let cart = [];
let currentCat = 'ทั้งหมด';
let discount = 0;
let cashEntered = '0';
let currentPayMethod = '';
let orderCounter = 1;
let priceMode = 'shop';

function setPriceMode(mode) {
  priceMode = mode;
  document.getElementById('btnShop').className = mode === 'shop' ? 'active' : '';
  document.getElementById('btnApp').className = mode === 'app' ? 'active' : '';
  const badge = document.getElementById('modeBadge');
  badge.textContent = mode === 'shop' ? 'หน้าร้าน' : 'แอป';
  badge.className = 'mode-badge ' + mode;
  // auto switch orderType
  const sel = document.getElementById('orderType');
  if (mode === 'shop' && sel.value.startsWith('app_')) sel.value = 'shop_eat';
  if (mode === 'app' && sel.value.startsWith('shop_')) sel.value = 'app_grab';
  renderItems(getCurrentMenuItems());
  renderCart();
}

function onOrderTypeChange() {
  const val = document.getElementById('orderType').value;
  if (val.startsWith('app_') && priceMode !== 'app') setPriceMode('app');
  if (val.startsWith('shop_') && priceMode !== 'shop') setPriceMode('shop');
}

function getItemPrice(item) {
  return (priceMode === 'app' && item.priceApp) ? item.priceApp : item.price;
}

function getCurrentMenuItems() {
  const q = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toLowerCase() : '';
  let items = MENU;
  if (currentCat !== 'ทั้งหมด') items = items.filter(i => i.cat === currentCat);
  if (q) items = items.filter(i => i.name.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q));
  return items;
}

function init() {
  const bar = document.getElementById('categoryBar');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === 'ทั้งหมด' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterItems(); };
    bar.appendChild(btn);
  });
  renderItems(MENU);
  updateClock();
  setInterval(updateClock, 1000);
  loadStockFromSheets();
  // Mobile: activate menu panel by default
  if (window.innerWidth <= 700) {
    document.querySelector('.menu-panel').classList.add('active');
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'});
}

function filterItems() {
  renderItems(getCurrentMenuItems());
}

function renderItems(items) {
  const grid = document.getElementById('itemsGrid');
  grid.innerHTML = items.map(item => {
    const p = getItemPrice(item);
    const hasTwo = item.priceApp && item.priceApp !== item.price;
    const priceHtml = hasTwo
      ? `<div class="item-price">฿${p} <span style="font-size:11px;font-weight:400;color:#aaa;text-decoration:${priceMode==='app'?'none':'none'};">${priceMode==='shop'?'<span style=\'color:#1a4fa8;font-size:10px;\'>แอป ฿'+item.priceApp+'</span>':'<span style=\'color:#2d7a2d;font-size:10px;\'>ร้าน ฿'+item.price+'</span>'}</span></div>`
      : `<div class="item-price">฿${p}</div>`;
    return `
    <div class="item-card" onclick="addToCart(${item.id})">
      <div class="item-cat-badge">${item.cat}</div>
      <div class="item-name">${item.name}</div>
      ${priceHtml}
    </div>`;
  }).join('');
}

function addToCart(id) {
  const item = MENU.find(i => i.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) { existing.qty++; existing.unitPrice = getItemPrice(item); }
  else { cart.push({...item, qty: 1, unitPrice: getItemPrice(item)}); }
  renderCart();
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id === id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function removeItem(id) {
  cart = cart.filter(c => c.id !== id);
  renderCart();
}

function renderCart() {
  const container = document.getElementById('orderItems');
  if (cart.length === 0) {
    container.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛒</div><div>ยังไม่มีรายการ</div><div style="font-size:12px;margin-top:4px;">กดเมนูเพื่อเพิ่มออเดอร์</div></div>`;
  } else {
    container.innerHTML = cart.map(item => `
      <div class="order-item">
        <div class="oi-name">${item.name}</div>
        <div class="oi-qty">
          <button onclick="changeQty(${item.id}, -1)">−</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${item.id}, 1)">+</button>
        </div>
        <div class="oi-price">฿${item.unitPrice * item.qty}</div>
        <button class="oi-remove" onclick="removeItem(${item.id})">✕</button>
      </div>
    `).join('');
  }
  updateSummary();
  updateCartBadge();
}

function applyDiscount() {
  const val = parseFloat(document.getElementById('discountInput').value) || 0;
  discount = val;
  updateSummary();
}

function getSubtotal() { return cart.reduce((s, i) => s + (i.unitPrice || i.price) * i.qty, 0); }
function getTotal() { return Math.max(0, getSubtotal() - discount); }

function updateSummary() {
  const sub = getSubtotal();
  const total = getTotal();
  document.getElementById('subtotal').textContent = '฿' + sub;
  document.getElementById('discountAmt').textContent = '-฿' + discount;
  document.getElementById('totalAmt').textContent = '฿' + total;
}

function clearOrder() {
  if (cart.length === 0) return;
  if (!confirm('ล้างรายการทั้งหมด?')) return;
  cart = [];
  discount = 0;
  document.getElementById('discountInput').value = '';
  document.getElementById('tableNum').value = '';
  document.getElementById('orderNote').value = '';
  renderCart();
}

function openPayModal(method) {
  if (cart.length === 0) { alert('กรุณาเพิ่มรายการก่อน'); return; }
  currentPayMethod = method;
  cashEntered = '0';
  document.getElementById('payModalTitle').textContent = 'ชำระเงิน - ' + method;
  document.getElementById('payTotalDisp').textContent = '฿' + getTotal();
  document.getElementById('cashInput').textContent = '0';
  updateChangeDisplay();
  document.getElementById('payModal').classList.add('show');
}

function closePayModal() { document.getElementById('payModal').classList.remove('show'); }

function numpadPress(val) {
  if (val === 'back') { cashEntered = cashEntered.length > 1 ? cashEntered.slice(0,-1) : '0'; }
  else { cashEntered = cashEntered === '0' ? val : cashEntered + val; }
  document.getElementById('cashInput').textContent = cashEntered;
  updateChangeDisplay();
}

function updateChangeDisplay() {
  const cash = parseInt(cashEntered) || 0;
  const total = getTotal();
  const change = cash - total;
  const el = document.getElementById('changeDisplay');
  if (cash === 0) { el.textContent = 'เงินทอน: ฿0'; el.className = 'change-display'; }
  else if (change >= 0) { el.textContent = 'เงินทอน: ฿' + change; el.className = 'change-display positive'; }
  else { el.textContent = 'ขาด: ฿' + Math.abs(change); el.className = 'change-display negative'; }
}

function confirmPayment() {
  const cash = parseInt(cashEntered) || 0;
  const total = getTotal();
  if (currentPayMethod === 'เงินสด' && cash < total) { alert('รับเงินไม่เพียงพอ'); return; }
  closePayModal();
  syncOrderToSheets({
    orderId: 'ORD-' + String(orderCounter).padStart(4, '0'),
    table: document.getElementById('tableNum').value,
    type: document.getElementById('orderType').value,
    items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty })),
    subtotal: getSubtotal(),
    discount: discount,
    total: getTotal(),
    payment: currentPayMethod,
    note: document.getElementById('orderNote').value
  });
  showReceipt(cash);
}

function showReceipt(cashReceived) {
  const total = getTotal();
  const change = currentPayMethod === 'เงินสด' ? cashReceived - total : 0;
  const table = document.getElementById('tableNum').value || '-';
  const note = document.getElementById('orderNote').value;
  const orderType = document.getElementById('orderType').value;
  const now = new Date();
  const dateStr = now.toLocaleString('th-TH');
  
  const receiptHTML = `
    <div class="receipt-header">
      <h3>☕ ร้านของเรา</h3>
      <div style="font-size:12px;color:#888;margin-top:4px;">${dateStr}</div>
      <div style="font-size:12px;margin-top:4px;">ออเดอร์ #${String(orderCounter).padStart(4,'0')} | ${orderType} | โต๊ะ: ${table} | ${priceMode==='app'?'ราคาแอป':'ราคาหน้าร้าน'}</div>
    </div>
    <div class="receipt-items">
      ${cart.map(item => `
        <div class="receipt-item">
          <span>${item.name} x${item.qty}</span>
          <span>฿${(item.unitPrice||item.price) * item.qty}</span>
        </div>
      `).join('')}
    </div>
    <div class="receipt-item"><span>รวม</span><span>฿${getSubtotal()}</span></div>
    ${discount > 0 ? `<div class="receipt-item" style="color:#e24b4a;"><span>ส่วนลด</span><span>-฿${discount}</span></div>` : ''}
    <div class="receipt-item receipt-total"><span>ยอดรวม</span><span>฿${total}</span></div>
    <div class="receipt-item"><span>ชำระโดย</span><span>${currentPayMethod}</span></div>
    ${currentPayMethod === 'เงินสด' ? `<div class="receipt-item"><span>รับเงิน</span><span>฿${cashReceived}</span></div><div class="receipt-item"><span>เงินทอน</span><span>฿${change}</span></div>` : ''}
    ${note ? `<div style="font-size:12px;color:#888;margin-top:8px;">หมายเหตุ: ${note}</div>` : ''}
    <div class="receipt-thanks">ขอบคุณที่ใช้บริการ 🙏</div>
  `;
  document.getElementById('receiptContent').innerHTML = receiptHTML;
  document.getElementById('receiptModal').classList.add('show');
  orderCounter++;
}

function closeReceiptModal() {
  document.getElementById('receiptModal').classList.remove('show');
  cart = [];
  discount = 0;
  document.getElementById('discountInput').value = '';
  document.getElementById('tableNum').value = '';
  document.getElementById('orderNote').value = '';
  renderCart();
}

function printReceipt() {
  const content = document.getElementById('receiptContent').innerHTML;
  const win = window.open('', '_blank', 'width=300,height=500');
  win.document.write(`<html><head><title>ใบเสร็จ</title><style>body{font-family:monospace;padding:16px;max-width:280px;} .receipt-header{text-align:center;} .receipt-item{display:flex;justify-content:space-between;margin:3px 0;font-size:13px;} .receipt-items{border-top:1px dashed #000;border-bottom:1px dashed #000;padding:6px 0;margin:6px 0;} .receipt-total{font-weight:bold;font-size:15px;} .receipt-thanks{text-align:center;color:#888;margin-top:10px;font-size:12px;}</style></head><body>${content}</body></html>`);
  win.document.close();
  win.print();
}

function switchTab(tab) {
  const menuPanel = document.querySelector('.menu-panel');
  const orderPanel = document.querySelector('.order-panel');
  const tabMenu = document.getElementById('tabMenu');
  const tabOrder = document.getElementById('tabOrder');
  if (tab === 'menu') {
    menuPanel.classList.add('active');
    orderPanel.classList.remove('active');
    tabMenu.classList.add('active');
    tabOrder.classList.remove('active');
  } else {
    orderPanel.classList.add('active');
    menuPanel.classList.remove('active');
    tabOrder.classList.add('active');
    tabMenu.classList.remove('active');
  }
}

function updateCartBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  const label = document.getElementById('tabOrderLabel');
  if (!badge) return;
  if (total > 0) {
    badge.style.display = 'inline';
    badge.textContent = total;
    label.textContent = '';
  } else {
    badge.style.display = 'none';
    label.textContent = 'ออเดอร์';
  }
}

// On mobile, after adding item switch to show feedback
function addToCartMobile(id) {
  addToCart(id);
  // flash the tab badge
  const badge = document.getElementById('cartBadge');
  if (badge) { badge.style.transform = 'scale(1.4)'; setTimeout(() => badge.style.transform = '', 200); }
}

init();
</script>
